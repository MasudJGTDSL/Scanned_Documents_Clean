<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}OCR Document Processor{% endblock %}</title>
  <meta name="description" content="Clean and OCR scanned documents — convert scanned images to searchable PDFs with Bangla &amp; English support." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'processor/css/style.css' %}" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🔍</span>
        <span class="logo-text">OCR<strong>Pro</strong></span>
      </div>
      <nav class="header-nav">
        <a href="{% url 'index' %}" class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}">New Job</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>OCR Document Processor &mdash; Powered by Tesseract &amp; OpenCV</p>
  </footer>
</body>
</html>
